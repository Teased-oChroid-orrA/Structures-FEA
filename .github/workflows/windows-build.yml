name: Windows Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: structures-fea-ann

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: structures-fea-ann/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Frontend type/lint checks
        run: npm run lint

      - name: Offline guard
        run: npm run verify:offline

      - name: UI budget guard
        run: npm run verify:ui-budgets

      - name: Repo hardening tests
        run: npm test

      - name: Frontend production build
        run: npm run build

      - name: Rust compile checks
        run: cargo check
        working-directory: structures-fea-ann/src-tauri

      - name: Build desktop app (Tauri)
        run: npm run tauri:build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-bundles
          path: |
            structures-fea-ann/src-tauri/target/release/bundle/**
          if-no-files-found: error
