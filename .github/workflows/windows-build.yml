name: Windows Build

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: structures-fea-ann

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: structures-fea-ann/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build desktop app (Tauri)
        run: npm run tauri:build

      - name: Upload Windows bundles
        uses: actions/upload-artifact@v4
        with:
          name: windows-tauri-bundles
          path: |
            structures-fea-ann/src-tauri/target/release/bundle/**
          if-no-files-found: error
