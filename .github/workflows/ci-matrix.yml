name: ci-matrix

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  checks:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: structures-fea-ann
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: structures-fea-ann/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Install frontend deps
        run: npm ci
      - name: Frontend lint/type check
        run: npm run lint
      - name: Offline guard
        run: npm run verify:offline
      - name: UI budget guard
        run: npm run verify:ui-budgets
      - name: Repo hardening tests
        run: npm test
      - name: Rust check
        run: cargo check --manifest-path src-tauri/Cargo.toml
      - name: Rust tests
        if: matrix.os == 'ubuntu-latest'
        run: cargo test --manifest-path src-tauri/Cargo.toml
      - name: Build frontend
        run: npm run build
